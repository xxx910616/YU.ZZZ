<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YU.ZZZ 定價助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-gray: #F8F9FA;
            --soft-blue: #F0F7FF;
            --deep-black: #1A1A1A;
            --pure-white: #FFFFFF;
            --highlight-yellow: #FACC15;
            --list-yellow: #FFFDF5; 
            --brand-blue-grey: #5b7189;
            --active-yellow: #FEF3C7;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans TC", sans-serif; 
            background-color: var(--bg-gray); 
            color: var(--deep-black);
            overflow-x: hidden;
        }
        
        /* 載入畫面優化 */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease-out, visibility 0.4s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .color-brand-custom { color: var(--brand-blue-grey); }
        .bg-brand-custom { background-color: var(--brand-blue-grey); }
        .color-yellow-main { color: var(--highlight-yellow); }

        .detail-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .history-card.expanded .detail-panel { max-height: 1200px; }
        .history-card.expanded .chevron { transform: rotate(180deg); }
        
        .weight-btn { transition: all 0.2s ease; border-color: #f3f4f6; }
        .weight-btn.active {
            background-color: var(--brand-blue-grey) !important; 
            color: var(--pure-white) !important;
            border-color: var(--brand-blue-grey) !important;
            box-shadow: 0 4px 12px rgba(91, 113, 137, 0.2);
        }
        .weight-btn:not(.active):active { background-color: var(--active-yellow) !important; }

        .list-container { background-color: var(--list-yellow); border-top: 1px solid #FEF3C7; }

        #imageModal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
        
        .clear-search-btn { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        #searchHistory:not(:placeholder-shown) + .clear-search-btn { display: block; }

        .img-box { border-radius: 1.2rem; }
        .stat-card { border-radius: 1.2rem; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #FFF9E5; background: white; transition: transform 0.2s; }
        .stat-card:active { transform: scale(0.95); }
        .stat-card.profit { background-color: #f0fdf4; border-color: #dcfce7; }
    </style>
</head>
<body class="min-h-screen text-slate-800">
    <!-- 載入動畫層 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-yellow-400 border-t-transparent"></div>
        <p class="mt-6 font-black text-gray-400 tracking-[0.3em] text-[10px] uppercase">CONNECTING TO CLOUD...</p>
    </div>

    <div class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <!-- Header -->
        <div class="p-6 pb-8 bg-white sticky top-0 z-20 shadow-sm border-b border-gray-100 rounded-b-[2.5rem]">
            <div class="flex justify-between items-start mb-6">
                <div class="flex flex-col">
                    <h1 class="text-5xl font-black color-brand-custom italic tracking-tighter leading-none">YU.ZZZ</h1>
                    <span class="text-[10px] font-black text-black tracking-[0.2em] mt-1 ml-1 uppercase">Official</span>
                </div>
                <div class="text-right flex flex-col justify-center">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest leading-none mb-1">Total Profit</p>
                    <p class="text-4xl font-black color-yellow-main italic leading-none tabular-nums">$<span id="totalProfit">0</span></p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-[var(--soft-blue)] p-3 rounded-2xl border border-blue-50">
                    <p class="text-[9px] text-blue-400 font-bold uppercase mb-1">Exchange Rate</p>
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <p id="currentRateDisplay" class="text-lg font-mono font-bold text-blue-900 leading-none">0.0000</p>
                            <p id="updateTime" class="text-[8px] text-blue-300 font-mono mt-1">UPDATE: --:--</p>
                        </div>
                        <button onclick="syncRates(this)" class="p-2 bg-white text-blue-600 rounded-xl active:scale-90 shadow-sm border border-blue-100">
                            <svg id="syncIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357-2H15"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="bg-[var(--soft-blue)] p-3 rounded-2xl border border-blue-50">
                    <p class="text-[9px] text-blue-400 font-bold mb-1 uppercase">Bank Fee %</p>
                    <div class="flex items-center gap-1">
                        <input type="number" id="bankFeeInput" value="1.5" step="0.1" onchange="update()" class="w-full bg-transparent text-lg font-black text-blue-900 leading-none outline-none">
                        <span class="text-lg font-black text-blue-900">%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="px-6 py-5 space-y-5">
            <div class="grid grid-cols-3 gap-2.5">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Currency</label>
                    <select id="currency" onchange="update()" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-bold outline-none shadow-sm appearance-none">
                        <option value="KRW">KRW 🇰🇷</option>
                        <option value="JPY">JPY 🇯🇵</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Profit %</label>
                    <input type="number" id="profitPercent" value="10" oninput="update()" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-bold outline-none shadow-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Extra</label>
                    <input type="number" id="manualCost" value="0" oninput="update()" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-bold outline-none shadow-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Weight Range</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setWeight('0', this)" data-label="2KG 以下" class="weight-btn active bg-white border p-3 rounded-xl text-[10px] font-black shadow-sm">2KG 以下 (+0)</button>
                    <button onclick="setWeight('2-5', this)" data-label="2-5KG" class="weight-btn bg-white border p-3 rounded-xl text-[10px] font-black shadow-sm">2-5KG (+60)</button>
                    <button onclick="setWeight('5-10', this)" data-label="5-10KG" class="weight-btn bg-white border p-3 rounded-xl text-[10px] font-black shadow-sm">5-10KG (+100)</button>
                    <button onclick="setWeight('10+', this)" data-label="10KG+" class="weight-btn bg-white border p-3 rounded-xl text-[10px] font-black shadow-sm">10KG+ (+150)</button>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Product Info</label>
                <div class="flex gap-2.5">
                    <input type="text" id="itemName" placeholder="產品名稱..." class="w-full p-4 bg-white border border-gray-200 rounded-xl text-sm font-bold outline-none shadow-sm">
                    <button onclick="triggerCamera()" class="px-5 bg-brand-custom text-white rounded-xl active:scale-90 shadow-md flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812-1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    </button>
                    <input type="file" id="hiddenCameraInput" accept="image/*" capture="environment" onchange="handleCameraPhoto(this)" class="hidden">
                </div>
                <div id="photoPreviewContainer" class="hidden flex justify-center pt-2">
                    <div class="relative">
                        <img id="photoPreviewImg" src="" class="w-24 h-24 object-cover rounded-2xl border-4 border-white shadow-xl">
                        <button onclick="clearCapturedImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-lg">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[9px] font-black text-gray-400 uppercase italic pl-2">Original Price</label>
                <div class="relative">
                    <input type="number" id="foreignPrice" oninput="update()" placeholder="0" class="w-full p-6 pr-24 text-5xl font-black rounded-[2.5rem] bg-white border border-gray-200 shadow-inner text-gray-600 tabular-nums outline-none">
                    <span id="priceSuffix" class="absolute right-8 top-1/2 -translate-y-1/2 font-black text-gray-200 text-2xl italic uppercase pointer-events-none">KRW</span>
                </div>
            </div>

            <div id="quickResult" class="hidden">
                <div class="bg-zinc-900 rounded-[2.5rem] p-7 text-white shadow-2xl relative overflow-hidden">
                    <div class="flex justify-between items-center mb-5">
                        <div>
                            <p class="text-[9px] text-yellow-400 font-bold uppercase tracking-widest">Suggested</p>
                            <p id="finalPrice" class="text-5xl font-black mt-1 tabular-nums">$ 0</p>
                        </div>
                        <div class="text-right space-y-1">
                            <p class="text-[10px] font-bold text-red-400 uppercase">Fee: <span id="resExtra">-$0</span></p>
                            <p class="text-[10px] font-bold text-emerald-400 uppercase">Profit: <span id="resProfit">+$0</span></p>
                        </div>
                    </div>
                    <button onclick="saveToHistory()" id="addButton" class="w-full py-4 bg-yellow-400 text-black font-black text-lg rounded-2xl active:scale-95 uppercase tracking-widest shadow-lg">ADD TO LIST</button>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="list-container p-6 rounded-t-[3rem] flex-grow min-h-[500px]">
            <div class="flex items-center gap-3 mb-6 px-1">
                <div class="flex items-center gap-1.5">
                    <span class="w-3 h-3 bg-yellow-400 rounded-full"></span>
                    <h2 class="text-[10px] font-black text-amber-900/60 uppercase italic tracking-widest">LIST</h2>
                </div>
                <div class="relative flex-grow">
                    <input type="text" id="searchHistory" oninput="render()" placeholder="Search..." class="w-full py-2 pl-8 pr-4 bg-white border border-amber-100 rounded-xl text-[10px] font-bold outline-none shadow-sm">
                    <svg class="w-3 h-3 absolute left-3 top-1/2 -translate-y-1/2 text-amber-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="3"></path></svg>
                </div>
                <button onclick="exportToExcel()" class="px-4 py-2 bg-white text-green-700 text-[10px] font-black rounded-xl border border-green-100 shadow-sm active:scale-90 uppercase">CSV</button>
            </div>
            <div id="historyList" class="space-y-4"></div>
        </div>
    </div>

    <div id="imageModal" onclick="this.style.display='none'">
        <img id="fullImage" src="" class="max-w-full max-h-[85vh] rounded-[2rem] shadow-2xl">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === 性能優化：強制超時隱藏載入畫面 ===
        const hideLoading = () => {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay && !overlay.classList.contains('hidden')) {
                overlay.classList.add('hidden');
            }
        };
        // 3秒後無論如何強制進入，避免卡死
        const bootTimer = setTimeout(hideLoading, 3000);

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'yu-zzz-assistant';

        let history = [];
        let exchangeRates = { KRW: 0.0245, JPY: 0.215 };
        let currentWeightTier = "0";
        let currentWeightLabel = "2KG 以下";
        let capturedImageData = null;

        const taxRefundTable = [
            { min: 30000, max: 49999, refund: 1500 },
            { min: 50000, max: 74999, refund: 3000 },
            { min: 75000, max: 99999, refund: 5000 },
            { min: 100000, max: 124999, refund: 6000 },
            { min: 125000, max: 149999, refund: 8000 },
            { min: 150000, max: 174999, refund: 9000 },
            { min: 175000, max: 199999, refund: 10000 },
            { min: 200000, max: 224999, refund: 12000 },
            { min: 225000, max: 249999, refund: 13000 },
            { min: 250000, max: 274999, refund: 15000 },
            { min: 275000, max: 299999, refund: 17000 },
            { min: 300000, max: 499999, refund: 20000 },
            { min: 500000, max: 999999, refund: 35000 }
        ];

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { 
                console.error("Auth failed", e);
                hideLoading(); // 失敗也要進入
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                clearTimeout(bootTimer);
                hideLoading();
                const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                onSnapshot(historyRef, (snapshot) => {
                    history = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                        .sort((a, b) => b.timestamp_raw - a.timestamp_raw);
                    render();
                }, (err) => console.error("Snapshot error", err));
            } else {
                initAuth();
            }
        });

        window.syncRates = async function(btn) {
            const icon = document.getElementById('syncIcon');
            icon?.classList.add('animate-spin');
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/TWD');
                const data = await res.json();
                if (data.result === 'success') {
                    exchangeRates.KRW = 1 / data.rates.KRW;
                    exchangeRates.JPY = 1 / data.rates.JPY;
                    const now = new Date();
                    document.getElementById('updateTime').innerText = `UPDATE: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
                    update();
                }
            } catch (e) { console.error(e); }
            setTimeout(() => icon?.classList.remove('animate-spin'), 600);
        };

        window.setWeight = function(tier, btn) {
            currentWeightTier = tier;
            currentWeightLabel = btn.getAttribute('data-label');
            document.querySelectorAll('.weight-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            update();
        };

        function getTaxRefund(foreignPrice) {
            if (document.getElementById('currency').value !== 'KRW') return 0;
            const tier = taxRefundTable.find(t => foreignPrice >= t.min && foreignPrice <= t.max);
            return tier ? tier.refund : (foreignPrice >= 1000000 ? Math.floor(foreignPrice * 0.06) : 0);
        }

        window.update = function() {
            const currency = document.getElementById('currency').value;
            const bankRate = exchangeRates[currency];
            const profitRate = (parseFloat(document.getElementById('profitPercent').value) || 0) / 100;
            const foreignPrice = parseFloat(document.getElementById('foreignPrice').value) || 0;
            const manualCostInput = parseFloat(document.getElementById('manualCost').value) || 0;
            const feeRate = (parseFloat(document.getElementById('bankFeeInput').value) || 1.5) / 100;
            
            let weightExtra = (currentWeightTier === "2-5") ? 60 : (currentWeightTier === "5-10" ? 100 : (currentWeightTier === "10+" ? 150 : 0));

            document.getElementById('priceSuffix').innerText = currency;
            document.getElementById('currentRateDisplay').innerText = bankRate.toFixed(4);

            if (foreignPrice <= 0) {
                document.getElementById('quickResult').classList.add('hidden');
                return null;
            }

            document.getElementById('quickResult').classList.remove('hidden');
            const rawTwdCost = foreignPrice * bankRate;
            const finalPrice = Math.round((rawTwdCost / (1 - feeRate - profitRate)) + weightExtra);
            const extraFee = Math.round(finalPrice * feeRate);
            const refundTwd = Math.round(getTaxRefund(foreignPrice) * bankRate);
            const netProfit = finalPrice - rawTwdCost - extraFee - manualCostInput + refundTwd;

            document.getElementById('resExtra').innerText = `-$${extraFee.toLocaleString()}`;
            document.getElementById('resProfit').innerText = `+$${Math.round(netProfit).toLocaleString()}`;
            document.getElementById('finalPrice').innerText = `$ ${finalPrice.toLocaleString()}`;

            const now = new Date();
            return {
                timestamp_raw: Date.now(),
                timestamp: `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`,
                name: document.getElementById('itemName').value || '未命名產品',
                image: capturedImageData,
                currency, foreign: foreignPrice, bankRate,
                rawTwdCost: Math.round(rawTwdCost),
                weightLabel: currentWeightLabel,
                refundTwd, finalPrice, extraFee,
                netProfit: Math.round(netProfit),
                manualCostInput
            };
        };

        window.triggerCamera = () => document.getElementById('hiddenCameraInput').click();
        window.handleCameraPhoto = (input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                capturedImageData = e.target.result;
                document.getElementById('photoPreviewImg').src = capturedImageData;
                document.getElementById('photoPreviewContainer').classList.remove('hidden');
                update();
            };
            reader.readAsDataURL(file);
        };
        window.clearCapturedImage = () => {
            capturedImageData = null;
            document.getElementById('photoPreviewContainer').classList.add('hidden');
        };

        window.saveToHistory = async () => {
            const data = update();
            if (!data) return;
            const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
            await addDoc(historyRef, data);
            document.getElementById('foreignPrice').value = '';
            document.getElementById('itemName').value = '';
            clearCapturedImage();
        };

        window.deleteItem = async (id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'history', id));
        };

        window.showBigImage = (src) => {
            document.getElementById('fullImage').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        };

        window.exportToExcel = () => {
            if (!history.length) return;
            const headers = ["Time", "Name", "Cost(TWD)", "Price", "Profit"];
            const rows = history.map(i => [i.timestamp, i.name, i.rawTwdCost, i.finalPrice, i.netProfit]);
            const csv = "\uFEFF" + [headers, ...rows].map(r => r.join(",")).join("\n");
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `YU_ZZZ_List.csv`;
            a.click();
        };

        window.render = () => {
            const list = document.getElementById('historyList');
            const search = document.getElementById('searchHistory').value.toLowerCase();
            list.innerHTML = '';
            let totalProfit = 0;

            history.filter(i => i.name.toLowerCase().includes(search)).forEach(item => {
                totalProfit += item.netProfit;
                const card = document.createElement('div');
                card.className = 'history-card bg-white rounded-[2rem] shadow-sm border border-amber-50 overflow-hidden mb-4';
                card.innerHTML = `
                    <div class="p-6 flex items-center justify-between cursor-pointer" onclick="this.closest('.history-card').classList.toggle('expanded')">
                        <div class="flex items-center gap-4 min-w-0">
                            <div class="chevron transition-transform text-amber-200">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="4"></path></svg>
                            </div>
                            <div class="min-w-0">
                                <h3 class="font-black text-black truncate text-lg">${item.name}</h3>
                                <p class="text-[10px] font-mono font-black text-blue-400 uppercase">
                                    ${item.foreign.toLocaleString()} ${item.currency} · RATE ${item.bankRate.toFixed(4)}
                                </p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right">
                                <p class="text-[24px] font-black text-slate-900 leading-none">$${item.finalPrice.toLocaleString()}</p>
                                <p class="text-[12px] text-emerald-500 font-black mt-1">+$${item.netProfit.toLocaleString()}</p>
                            </div>
                            <button onclick="deleteItem('${item.id}')" class="p-2 text-slate-200 hover:text-red-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="detail-panel bg-amber-50/20">
                        <div class="px-6 pb-6 pt-2">
                             <div class="flex gap-4 mb-5 items-center">
                                ${item.image ? `<img src="${item.image}" onclick="showBigImage('${item.image}')" class="w-20 h-20 img-box object-cover shadow-md border-2 border-white">` : `<div class="w-20 h-20 bg-white border border-amber-50 img-box flex items-center justify-center"><span class="text-[8px] font-black text-amber-200 uppercase">No Image</span></div>`}
                                <div class="flex-grow">
                                    <p class="text-[9px] font-black text-blue-400 italic mb-1 uppercase">Weight Info</p>
                                    <span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-[10px] font-black">${item.weightLabel}</span>
                                    <p class="text-[8px] text-gray-300 font-mono mt-2">${item.timestamp}</p>
                                </div>
                             </div>
                             <div class="grid grid-cols-4 gap-2.5">
                                <div class="stat-card">
                                    <span class="text-[8px] font-black text-gray-400 uppercase mb-1">Cost</span>
                                    <span class="text-xs font-black text-slate-800">$${item.rawTwdCost}</span>
                                </div>
                                <div class="stat-card">
                                    <span class="text-[8px] font-black text-red-400 uppercase mb-1">Fee</span>
                                    <span class="text-xs font-black text-red-400">-$${item.extraFee}</span>
                                </div>
                                <div class="stat-card">
                                    <span class="text-[8px] font-black text-blue-400 uppercase mb-1">Tax</span>
                                    <span class="text-xs font-black text-blue-400">+$${item.refundTwd}</span>
                                </div>
                                <div class="stat-card profit">
                                    <span class="text-[8px] font-black text-emerald-500 uppercase mb-1">Profit</span>
                                    <span class="text-xs font-black text-emerald-500">+$${item.netProfit}</span>
                                </div>
                             </div>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
            document.getElementById('totalProfit').innerText = totalProfit.toLocaleString();
        };

        window.onload = syncRates;
    </script>
</body>
</html>
