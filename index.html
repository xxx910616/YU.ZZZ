<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YU.ZZZ 定價助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-gray: #F8F9FA;
            --soft-blue: #F0F7FF;
            --deep-black: #1A1A1A;
            --brand-blue-grey: #5b7189;
            --highlight-yellow: #FACC15;
            --light-yellow: #FFFDF5;
            --active-yellow: #FEF3C7;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; 
            background-color: var(--bg-gray); 
            color: var(--deep-black);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease-out;
        }

        /* 樣式對齊圖檔 */
        .weight-btn { transition: all 0.2s; border: 1.5px solid #f1f5f9; background: white; }
        .weight-btn.active {
            background-color: var(--brand-blue-grey) !important;
            color: white !important;
            border-color: var(--brand-blue-grey) !important;
        }

        .history-card { border-radius: 2rem; background: white; overflow: hidden; margin-bottom: 1rem; border: 1px solid #f8f9fa; transition: transform 0.2s; }
        .history-card:active { transform: scale(0.99); }
        .detail-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); background-color: #FFFDF5; }
        .expanded .detail-panel { max-height: 1000px; }
        .expanded .chevron { transform: rotate(180deg); }

        .stat-box { 
            background: white; 
            border: 2px solid #FFF9E5; 
            border-radius: 1.2rem; 
            aspect-ratio: 1.2 / 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .stat-box.profit { background-color: #F0FDF4; border-color: #DCFCE7; }
        
        /* 隱藏捲軸 */
        ::-webkit-scrollbar { width: 0; background: transparent; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loadingOverlay" class="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-yellow-400 border-t-transparent"></div>
        <p class="mt-4 font-black text-gray-400 tracking-widest text-[10px] uppercase">Connecting to YU.ZZZ...</p>
    </div>

    <div class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <!-- Top Bar -->
        <div class="p-6 pb-8 bg-white sticky top-0 z-20 shadow-sm border-b border-gray-100 rounded-b-[2.5rem]">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h1 class="text-5xl font-black text-[#5b7189] italic tracking-tighter leading-none">YU.ZZZ</h1>
                    <span class="text-[10px] font-black text-black tracking-[0.2em] mt-1 ml-1 uppercase">Official Tool</span>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">Total Profit</p>
                    <p class="text-4xl font-black text-yellow-500 italic leading-none">$<span id="totalProfit">0</span></p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-[#F0F7FF] p-3 rounded-2xl border border-blue-50">
                    <p class="text-[9px] text-blue-400 font-bold uppercase mb-1">Exchange Rate</p>
                    <div class="flex items-center justify-between">
                        <p id="rateDisplay" class="text-lg font-mono font-bold text-blue-900 leading-none">0.0245</p>
                        <button onclick="syncRates()" class="p-1.5 bg-white text-blue-600 rounded-lg shadow-sm active:scale-90 transition-transform">
                            <svg id="syncIcon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357-2H15"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="bg-[#F0F7FF] p-3 rounded-2xl border border-blue-50">
                    <p class="text-[9px] text-blue-400 font-bold mb-1 uppercase">Bank Fee %</p>
                    <input type="number" id="bankFee" value="1.5" oninput="runUpdate()" class="w-full bg-transparent text-lg font-black text-blue-900 leading-none outline-none">
                </div>
            </div>
        </div>

        <!-- Inputs -->
        <div class="px-6 py-5 space-y-5">
            <div class="grid grid-cols-3 gap-2">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-400 uppercase">Currency</label>
                    <select id="currency" onchange="runUpdate()" class="w-full p-3 bg-white border border-gray-100 rounded-xl text-xs font-bold shadow-sm outline-none">
                        <option value="KRW">KRW 🇰🇷</option>
                        <option value="JPY">JPY 🇯🇵</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-400 uppercase">Profit %</label>
                    <input type="number" id="profitPct" value="10" oninput="runUpdate()" class="w-full p-3 bg-white border border-gray-100 rounded-xl text-xs font-bold shadow-sm outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-400 uppercase">Extra Cost</label>
                    <input type="number" id="extraCost" value="0" oninput="runUpdate()" class="w-full p-3 bg-white border border-gray-100 rounded-xl text-xs font-bold shadow-sm outline-none">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Weight Range</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setWeightTier('0', this)" class="weight-btn active p-3 rounded-xl text-[10px] font-black shadow-sm">2KG 以下 (+0)</button>
                    <button onclick="setWeightTier('60', this)" class="weight-btn p-3 rounded-xl text-[10px] font-black shadow-sm">2-5KG (+60)</button>
                    <button onclick="setWeightTier('100', this)" class="weight-btn p-3 rounded-xl text-[10px] font-black shadow-sm">5-10KG (+100)</button>
                    <button onclick="setWeightTier('150', this)" class="weight-btn p-3 rounded-xl text-[10px] font-black shadow-sm">10KG+ (+150)</button>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[9px] font-black text-gray-400 uppercase">Product Name</label>
                <input type="text" id="pName" placeholder="產品名稱..." class="w-full p-4 bg-white border border-gray-100 rounded-xl text-sm font-bold shadow-sm outline-none">
            </div>

            <div class="space-y-1">
                <label class="text-[9px] font-black text-gray-400 uppercase italic">Original Price</label>
                <div class="relative">
                    <input type="number" id="foreignPrice" oninput="runUpdate()" placeholder="0" class="w-full p-6 text-5xl font-black rounded-[2.5rem] bg-white border border-gray-200 shadow-inner text-gray-700 outline-none">
                    <span id="currencyLabel" class="absolute right-8 top-1/2 -translate-y-1/2 font-black text-gray-200 text-2xl italic uppercase pointer-events-none">KRW</span>
                </div>
            </div>

            <div id="resultBox" class="hidden">
                <div class="bg-zinc-900 rounded-[2.5rem] p-7 text-white shadow-2xl transition-all">
                    <div class="flex justify-between items-center mb-5">
                        <div>
                            <p class="text-[9px] text-yellow-400 font-bold uppercase tracking-widest">Suggested Price</p>
                            <p id="suggestedPrice" class="text-5xl font-black mt-1">$ 0</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-emerald-400 uppercase">Profit: <span id="suggestedProfit">+$0</span></p>
                        </div>
                    </div>
                    <button onclick="saveItem()" id="addBtn" class="w-full py-4 bg-yellow-400 text-black font-black text-lg rounded-2xl active:scale-95 uppercase tracking-widest shadow-lg">ADD TO LIST</button>
                </div>
            </div>
        </div>

        <!-- History List -->
        <div class="bg-[#FFFDF5] p-6 rounded-t-[3rem] flex-grow border-t border-amber-100 min-h-[400px]">
            <div class="flex items-center gap-3 mb-6 px-1">
                <span class="w-3 h-3 bg-yellow-400 rounded-full"></span>
                <h2 class="text-[10px] font-black text-amber-900/60 uppercase italic tracking-widest">History List</h2>
            </div>
            <div id="listContainer" class="space-y-4 pb-10"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 初始化
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'yu-zzz-assistant';

        // 全域變數
        let rates = { KRW: 0.0245, JPY: 0.215 };
        let weightExtra = 0;
        let items = [];

        // --- 核心邏輯 ---

        // 同步匯率 (獨立執行)
        window.syncRates = async () => {
            const icon = document.getElementById('syncIcon');
            if (icon) icon.classList.add('animate-spin');
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/TWD');
                const data = await res.json();
                if (data.result === 'success') {
                    rates.KRW = 1 / data.rates.KRW;
                    rates.JPY = 1 / data.rates.JPY;
                    runUpdate();
                }
            } catch (e) { console.warn("Exchange rate fetch failed, using default."); }
            if (icon) setTimeout(() => icon.classList.remove('animate-spin'), 500);
        };

        // 設定重量
        window.setWeightTier = (val, btn) => {
            weightExtra = parseFloat(val);
            document.querySelectorAll('.weight-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            runUpdate();
        };

        // 計算退稅
        function getKRWRefund(price) {
            if (price < 30000) return 0;
            if (price < 50000) return 1500;
            if (price < 75000) return 3000;
            if (price < 100000) return 5000;
            if (price < 125000) return 6000;
            if (price < 150000) return 8000;
            if (price < 175000) return 9000;
            if (price < 200000) return 10000;
            if (price < 225000) return 12000;
            if (price < 250000) return 13000;
            if (price < 275000) return 15000;
            if (price < 300000) return 17000;
            if (price < 500000) return 20000;
            return 35000;
        }

        // 更新運算 (優化效能，立即可用)
        window.runUpdate = () => {
            const cur = document.getElementById('currency').value;
            const bankRate = rates[cur];
            const pPct = (parseFloat(document.getElementById('profitPct').value) || 0) / 100;
            const bFee = (parseFloat(document.getElementById('bankFee').value) || 1.5) / 100;
            const extra = parseFloat(document.getElementById('extraCost').value) || 0;
            const price = parseFloat(document.getElementById('foreignPrice').value) || 0;

            document.getElementById('rateDisplay').innerText = bankRate.toFixed(4);
            document.getElementById('currencyLabel').innerText = cur;

            if (price <= 0) {
                document.getElementById('resultBox').classList.add('hidden');
                return null;
            }

            document.getElementById('resultBox').classList.remove('hidden');

            const twdCost = price * bankRate;
            const suggested = Math.round((twdCost / (1 - bFee - pPct)) + weightExtra);
            const feeVal = Math.round(suggested * bFee);
            const refund = cur === 'KRW' ? Math.round(getKRWRefund(price) * bankRate) : 0;
            const profit = suggested - twdCost - feeVal - extra + refund;

            document.getElementById('suggestedPrice').innerText = `$ ${suggested.toLocaleString()}`;
            document.getElementById('suggestedProfit').innerText = `+$${Math.round(profit).toLocaleString()}`;

            return {
                name: document.getElementById('pName').value || '未命名產品',
                foreign: price,
                currency: cur,
                rate: bankRate,
                final: suggested,
                profit: Math.round(profit),
                costTwd: Math.round(twdCost),
                fee: feeVal,
                refund: refund,
                weight: weightExtra,
                time: new Date().toISOString(),
                displayTime: new Date().toLocaleString('zh-TW', { hour12: false }).replace(/:[^:]*$/, '')
            };
        };

        // 存檔
        window.saveItem = async () => {
            const data = runUpdate();
            if (!data) return;
            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            btn.innerText = "SAVING...";
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                await addDoc(colRef, data);
                document.getElementById('foreignPrice').value = '';
                document.getElementById('pName').value = '';
                document.getElementById('resultBox').classList.add('hidden');
            } catch (e) { console.error("Save error", e); }
            btn.disabled = false;
            btn.innerText = "ADD TO LIST";
        };

        // 刪除
        window.deleteItem = async (e, id) => {
            e.stopPropagation();
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'history', id));
            } catch (e) { console.error("Delete error", e); }
        };

        // 渲染清單
        function render() {
            const container = document.getElementById('listContainer');
            if (!container) return;
            container.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                total += item.profit;
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="p-6 flex justify-between items-start" onclick="this.parentElement.classList.toggle('expanded')">
                        <div class="flex gap-4">
                            <div class="chevron transition-transform mt-1 text-amber-300">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="4"></path></svg>
                            </div>
                            <div>
                                <h3 class="font-black text-lg text-black leading-tight">${item.name}</h3>
                                <p class="text-[10px] font-bold text-blue-400 uppercase mt-1">
                                    ${item.foreign.toLocaleString()} ${item.currency} · RATE ${item.rate.toFixed(4)}
                                </p>
                                <p class="text-[9px] text-gray-300 font-medium mt-1">${item.displayTime}</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-4">
                            <div class="text-right">
                                <p class="text-2xl font-black text-slate-900 leading-none">$${item.final.toLocaleString()}</p>
                                <p class="text-[13px] font-black text-emerald-500 mt-1">+$${item.profit.toLocaleString()}</p>
                            </div>
                            <button onclick="deleteItem(event, '${item.id}')" class="text-gray-200 hover:text-red-400 p-1">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3" stroke-linecap="round"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="detail-panel">
                        <div class="p-6 pt-0">
                            <div class="text-[10px] font-black text-yellow-500 uppercase italic mb-4 tracking-widest">Product Details</div>
                            <div class="flex gap-4 mb-6">
                                <div class="w-24 h-24 bg-white rounded-[1.2rem] border-2 border-amber-50 flex items-center justify-center shadow-sm">
                                    <span class="text-[9px] font-black text-amber-200">NO IMAGE</span>
                                </div>
                                <div class="flex flex-col justify-center">
                                    <p class="text-[9px] font-black text-blue-400 uppercase italic mb-1">Product Name</p>
                                    <div class="flex items-center gap-2">
                                        <span class="text-base font-black text-slate-800">${item.name}</span>
                                    </div>
                                    <div class="mt-3 flex items-center gap-2 bg-[#FEF3C7] px-3 py-1.5 rounded-full w-fit">
                                        <svg class="w-3 h-3 text-yellow-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                                        <span class="text-[10px] font-black text-yellow-700">${item.weight > 0 ? (item.weight === 60 ? '2-5KG' : (item.weight === 100 ? '5-10KG' : '10KG+')) : '2KG 以下'}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-4 gap-3">
                                <div class="stat-box"><span class="text-[8px] font-black text-gray-400 uppercase mb-1">Cost</span><span class="text-xs font-black">$${item.costTwd}</span></div>
                                <div class="stat-box"><span class="text-[8px] font-black text-red-400 uppercase mb-1">Fees</span><span class="text-xs font-black text-red-400">-$${item.fee}</span></div>
                                <div class="stat-box"><span class="text-[8px] font-black text-blue-400 uppercase mb-1">Tax</span><span class="text-xs font-black text-blue-400">+$${item.refund}</span></div>
                                <div class="stat-box profit"><span class="text-[8px] font-black text-emerald-500 uppercase mb-1">Profit</span><span class="text-xs font-black text-emerald-500">+$${item.profit}</span></div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            const totalDisplay = document.getElementById('totalProfit');
            if (totalDisplay) totalDisplay.innerText = total.toLocaleString();
        }

        // --- 初始化啟動 (優化順序) ---
        async function start() {
            // 1. 立即移除載入畫面，讓使用者可以用計算機
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 300);
            }

            // 2. 平行啟動匯率同步
            syncRates();
            
            // 3. 處理 Firebase 背景登入
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.warn("Firebase Auth background silent fail."); }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                    onSnapshot(colRef, (snap) => {
                        items = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                                    .sort((a,b) => new Date(b.time) - new Date(a.time));
                        render();
                    }, (err) => console.error("Snapshot error", err));
                }
            });
        }

        // 啟動
        start();
    </script>
</body>
</html>
