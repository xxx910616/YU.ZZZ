<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YU.ZZZ OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-gray: #F8F9FA;
            --soft-blue: #F0F7FF;
            --deep-black: #1A1A1A;
            --pure-white: #FFFFFF;
            --highlight-yellow: #FACC15;
            --list-yellow: #FFFBEB; 
            --brand-blue-grey: #5b7189;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans TC", sans-serif; 
            background-color: var(--bg-gray); 
            color: var(--deep-black);
            overflow-x: hidden;
        }
        
        .color-brand-custom { color: var(--brand-blue-grey); }
        .bg-brand-custom { background-color: var(--brand-blue-grey); }
        .color-yellow-main { color: var(--highlight-yellow); }

        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .detail-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .history-card.expanded .detail-panel { max-height: 800px; }
        .history-card.expanded .chevron { transform: rotate(180deg); }
        
        .weight-btn.active {
            background-color: var(--brand-blue-grey) !important; 
            color: var(--pure-white) !important;
            border-color: var(--brand-blue-grey) !important;
        }
        
        .stat-box {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            height: 64px; 
            background: white;
            border-radius: 14px;
            border: 1px solid #fef3c7;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .list-container {
            background-color: var(--list-yellow);
            border-top: 1px solid #FEF3C7;
            box-shadow: 0 -10px 25px -5px rgba(251, 191, 36, 0.1);
        }

        #imageModal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 20px; }
        
        .clear-search-btn {
            display: none;
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        #searchHistory:not(:placeholder-shown) + .clear-search-btn {
            display: block;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col relative">
        
        <!-- 頂部數據看板 -->
        <div class="p-6 pb-8 bg-[var(--pure-white)] sticky top-0 z-20 shadow-sm border-b border-gray-100 rounded-b-[2.5rem]">
            <div class="flex justify-between items-start mb-6">
                <div class="flex flex-col">
                    <h1 class="text-5xl font-black color-brand-custom italic tracking-tighter leading-none">YU.ZZZ</h1>
                    <span class="text-[10px] font-black text-black tracking-[0.3em] mt-1 ml-1 uppercase">Officia｜2 0 0 2</span>
                </div>
                <div class="text-right flex flex-col justify-center">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest leading-none mb-1">Total Profit</p>
                    <p class="text-4xl font-black color-yellow-main italic leading-none tabular-nums">$<span id="totalProfit">0</span></p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-[var(--soft-blue)] p-3 rounded-2xl border border-blue-50">
                    <p class="text-[9px] text-blue-400 font-bold uppercase mb-1">Exchange Rate</p>
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <p id="currentRateDisplay" class="text-lg font-mono font-bold text-blue-900 leading-none">0.0000</p>
                            <p id="updateTime" class="text-[8px] text-blue-300 font-mono mt-1">--:--</p>
                        </div>
                        <button onclick="syncRates(this)" class="p-2 bg-white text-blue-600 rounded-xl active:scale-90 shadow-sm border border-blue-100">
                            <svg id="syncIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="bg-[var(--soft-blue)] p-3 rounded-2xl border border-blue-50">
                    <p class="text-[9px] text-blue-400 font-bold mb-1 uppercase">Bank Fee %</p>
                    <div class="flex items-center gap-1">
                        <input type="number" id="bankFeeInput" value="1.5" step="0.1" class="w-full bg-transparent text-lg font-black text-blue-900 leading-none outline-none">
                        <span class="text-lg font-black text-blue-900">%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 輸入區域 -->
        <div class="px-6 py-5 space-y-5">
            <div class="grid grid-cols-3 gap-2.5">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Currency</label>
                    <select id="currency" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-bold outline-none shadow-sm appearance-none">
                        <option value="KRW">KRW 🇰🇷</option>
                        <option value="JPY">JPY 🇯🇵</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Profit %</label>
                    <input type="number" id="profitPercent" value="10" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-bold outline-none shadow-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Extra cost</label>
                    <input type="number" id="manualCost" value="0" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-bold outline-none shadow-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[9px] font-black text-gray-400 uppercase ml-1 tracking-widest">Weight Range</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setWeight('0', this)" data-label="2kg 以下" class="weight-btn active border bg-white p-3 rounded-xl text-[10px] font-black shadow-sm">2kg 以下 (+0)</button>
                    <button onclick="setWeight('2-5', this)" data-label="2-5kg" class="weight-btn bg-white border border-gray-200 p-3 rounded-xl text-[10px] font-black shadow-sm">2-5kg (+60)</button>
                    <button onclick="setWeight('5-10', this)" data-label="5-10kg" class="weight-btn bg-white border border-gray-200 p-3 rounded-xl text-[10px] font-black shadow-sm">5-10kg (+100)</button>
                    <button onclick="setWeight('10+', this)" data-label="10kg+" class="weight-btn bg-white border border-gray-200 p-3 rounded-xl text-[10px] font-black shadow-sm">10kg+ (+150)</button>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[9px] font-black text-gray-400 uppercase ml-1 tracking-widest">Product Info</label>
                <div class="flex gap-2.5">
                    <input type="text" id="itemName" placeholder="輸入產品名稱..." class="w-full p-4 bg-white border border-gray-200 rounded-xl text-sm font-bold outline-none shadow-sm">
                    <button onclick="triggerCamera()" class="px-5 bg-brand-custom text-white rounded-xl active:scale-90 shadow-md flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812-1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    </button>
                    <input type="file" id="hiddenCameraInput" accept="image/*" capture="environment" onchange="handleCameraPhoto(this)" class="hidden">
                </div>
                <div id="photoPreviewContainer" class="hidden flex justify-center pt-2">
                    <div class="relative">
                        <img id="photoPreviewImg" src="" class="w-24 h-24 object-cover rounded-2xl border-4 border-white shadow-xl">
                        <button onclick="clearCapturedImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-lg">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 價格區 -->
        <div class="px-6 pb-8 space-y-5">
            <div class="space-y-1">
                <label class="text-[10px] uppercase font-black text-gray-400 italic block pl-2 tracking-tighter">Local Original Price</label>
                <div class="relative">
                    <input type="number" id="foreignPrice" placeholder="0" class="w-full p-6 pl-8 pr-24 text-5xl font-black rounded-[2rem] outline-none bg-white border border-gray-200 shadow-inner text-left tabular-nums text-gray-500">
                    <span id="priceSuffix" class="absolute right-8 top-1/2 -translate-y-1/2 font-black text-gray-200 text-2xl italic uppercase pointer-events-none">KRW</span>
                </div>
            </div>

            <div id="quickResult" class="hidden">
                <div class="bg-[var(--deep-black)] rounded-[2.5rem] p-7 text-white shadow-2xl relative overflow-hidden">
                    <div class="flex justify-between items-center mb-5">
                        <div class="min-w-0 pr-3">
                            <p class="text-[9px] text-yellow-400 font-bold uppercase tracking-widest">Suggested Price</p>
                            <p id="finalPrice" class="text-5xl font-black mt-1 tabular-nums text-white">$ 0</p>
                        </div>
                        <div class="text-right shrink-0 space-y-1.5">
                            <p class="text-[10px] font-bold text-red-400 italic flex items-center justify-end gap-1 uppercase">Fee: <span id="resExtra">-$0</span></p>
                            <p class="text-[10px] font-bold text-green-400 italic flex items-center justify-end gap-1 uppercase">Profit: <span id="resProfit">+$0</span></p>
                            <p class="text-[10px] font-bold text-gray-400 italic flex items-center justify-end gap-1 uppercase">Cost: <span id="resOriginal">+$0</span></p>
                        </div>
                    </div>
                    <button onclick="saveToHistory()" class="w-full py-4.5 bg-yellow-400 hover:bg-yellow-300 text-black font-black text-lg rounded-2xl transition-all active:scale-95 uppercase tracking-widest shadow-lg">ADD TO LIST</button>
                </div>
            </div>
        </div>

        <!-- 歷史清單 -->
        <div class="list-container p-6 rounded-t-[3rem] flex-grow min-h-[400px]">
            <div class="flex items-center gap-3 mb-6 px-1">
                <div class="flex items-center gap-1.5 shrink-0">
                    <span class="w-3 h-3 bg-yellow-400 rounded-full"></span>
                    <h2 class="text-[10px] font-black text-amber-900/60 uppercase tracking-tighter italic whitespace-nowrap">LIST</h2>
                </div>
                
                <div class="relative flex-grow">
                    <input type="text" id="searchHistory" oninput="render()" placeholder="Search..." class="w-full py-2 pl-8 pr-8 bg-white border border-amber-100 rounded-xl text-[10px] font-bold outline-none shadow-sm focus:border-amber-300 transition-colors">
                    <svg class="w-3 h-3 absolute left-3 top-1/2 -translate-y-1/2 text-amber-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <button onclick="clearSearch()" class="clear-search-btn">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                </div>
                
                <button onclick="exportToExcel()" class="px-4 py-2 bg-white text-green-700 text-[10px] font-black rounded-xl border border-green-100 shadow-sm active:scale-90 transition-all shrink-0 uppercase">CSV</button>
            </div>

            <div id="historyList" class="space-y-4"></div>

            <!-- 頁尾宣告 -->
            <div class="mt-12 mb-4 text-center">
                <p class="text-[10px] font-bold text-amber-900/20 tracking-[0.4em] uppercase">Y U . Z Z Z ™</p>
            </div>
        </div>
    </div>

    <div id="imageModal" onclick="this.style.display='none'">
        <img id="fullImage" src="" class="max-w-full max-h-[85vh] rounded-[2rem] shadow-2xl">
    </div>

    <script>
        let history = [];
        let exchangeRates = { KRW: 0.0240, JPY: 0.210 };
        let currentWeightTier = "0";
        let currentWeightLabel = "2kg 以下";
        let capturedImageData = null;

        const taxRefundTable = [
            { min: 30000, max: 49999, refund: 1500 },
            { min: 50000, max: 74999, refund: 3000 },
            { min: 75000, max: 99999, refund: 5000 },
            { min: 100000, max: 124999, refund: 6000 },
            { min: 125000, max: 149999, refund: 8000 },
            { min: 150000, max: 174999, refund: 9000 },
            { min: 175000, max: 199999, refund: 10000 },
            { min: 200000, max: 224999, refund: 12000 },
            { min: 225000, max: 249999, refund: 13000 },
            { min: 250000, max: 274999, refund: 15000 },
            { min: 275000, max: 299999, refund: 17000 },
            { min: 300000, max: 499999, refund: 20000 },
            { min: 500000, max: 999999, refund: 35000 }
        ];

        function getTaxRefund(foreignPrice) {
            if (document.getElementById('currency').value !== 'KRW') return 0;
            const tier = taxRefundTable.find(t => foreignPrice >= t.min && foreignPrice <= t.max);
            if (tier) return tier.refund;
            if (foreignPrice >= 1000000) return foreignPrice * 0.06;
            return 0;
        }

        async function syncRates(btn) {
            const icon = document.getElementById('syncIcon');
            if (icon) icon.classList.add('animate-spin');
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/TWD');
                const data = await res.json();
                if (data.result === 'success') {
                    exchangeRates.KRW = 1 / data.rates.KRW;
                    exchangeRates.JPY = 1 / data.rates.JPY;
                    document.getElementById('updateTime').innerText = `下午${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false})}`;
                    update();
                }
            } catch (e) { console.error("Rate fetch failed"); }
            setTimeout(() => icon && icon.classList.remove('animate-spin'), 600);
        }

        function setWeight(tier, btn) {
            currentWeightTier = tier;
            currentWeightLabel = btn.getAttribute('data-label');
            document.querySelectorAll('.weight-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            update();
        }

        function update() {
            const currency = document.getElementById('currency').value;
            const bankRate = exchangeRates[currency];
            const profitRate = (parseFloat(document.getElementById('profitPercent').value) || 0) / 100;
            const foreignPrice = parseFloat(document.getElementById('foreignPrice').value) || 0;
            const manualCostInput = parseFloat(document.getElementById('manualCost').value) || 0;
            const feeRate = (parseFloat(document.getElementById('bankFeeInput').value) || 1.5) / 100;
            
            let weightExtra = 0;
            if (currentWeightTier === "2-5") weightExtra = 60;
            else if (currentWeightTier === "5-10") weightExtra = 100;
            else if (currentWeightTier === "10+") weightExtra = 150;

            document.getElementById('priceSuffix').innerText = currency;
            document.getElementById('currentRateDisplay').innerText = bankRate.toFixed(4);

            if (foreignPrice <= 0) {
                document.getElementById('quickResult').classList.add('hidden');
                return null;
            }

            document.getElementById('quickResult').classList.remove('hidden');

            const rawTwdCost = (foreignPrice * bankRate);
            const targetPrice = (rawTwdCost / (1 - feeRate - profitRate)) + weightExtra;
            const finalPrice = Math.round(targetPrice);
            const extraFee = Math.round(finalPrice * feeRate);
            const refundKrw = getTaxRefund(foreignPrice);
            const refundTwd = Math.round(refundKrw * bankRate);
            const netProfit = finalPrice - rawTwdCost - extraFee - manualCostInput + refundTwd;

            document.getElementById('resOriginal').innerText = `+$${Math.round(rawTwdCost).toLocaleString()}`;
            document.getElementById('resExtra').innerText = `-$${extraFee.toLocaleString()}`;
            document.getElementById('resProfit').innerText = `+$${Math.round(netProfit).toLocaleString()}`;
            document.getElementById('finalPrice').innerText = `$ ${finalPrice.toLocaleString()}`;

            const now = new Date();
            const dateStr = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            return {
                id: Date.now(),
                timestamp: `${dateStr} ${timeStr}`,
                date: dateStr,
                time: timeStr,
                name: document.getElementById('itemName').value || '未命名產品',
                image: capturedImageData,
                currency,
                foreign: foreignPrice,
                bankRate,
                rawTwdCost: Math.round(rawTwdCost),
                feeRate,
                weightExtra,
                weightLabel: currentWeightLabel,
                refundTwd,
                finalPrice: finalPrice,
                extraFee: extraFee,
                netProfit: netProfit,
                manualCostInput
            };
        }

        function triggerCamera() { document.getElementById('hiddenCameraInput').click(); }
        function handleCameraPhoto(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                capturedImageData = e.target.result;
                document.getElementById('photoPreviewImg').src = capturedImageData;
                document.getElementById('photoPreviewContainer').classList.remove('hidden');
                update();
            };
            reader.readAsDataURL(file);
            input.value = "";
        }

        function clearCapturedImage() {
            capturedImageData = null;
            document.getElementById('photoPreviewContainer').classList.add('hidden');
            document.getElementById('photoPreviewImg').src = '';
        }

        function saveToHistory() {
            const data = update();
            if (!data) return;
            history.unshift(data);
            render();
            resetInput();
        }

        function resetInput() {
            document.getElementById('foreignPrice').value = '';
            document.getElementById('itemName').value = '';
            clearCapturedImage();
            document.getElementById('quickResult').classList.add('hidden');
        }

        function clearSearch() {
            document.getElementById('searchHistory').value = '';
            render();
        }

        function toggleEdit(id) {
            const displayEl = document.getElementById(`name-display-${id}`);
            const editEl = document.getElementById(`name-edit-${id}`);
            if (displayEl.classList.contains('hidden')) {
                displayEl.classList.remove('hidden');
                editEl.classList.add('hidden');
            } else {
                displayEl.classList.add('hidden');
                editEl.classList.remove('hidden');
                document.getElementById(`edit-input-${id}`).focus();
            }
        }

        function updateName(id) {
            const input = document.getElementById(`edit-input-${id}`);
            const idx = history.findIndex(i => i.id === id);
            if (idx !== -1) { 
                history[idx].name = input.value || "未命名產品"; 
                render(); 
            }
        }

        function render() {
            const list = document.getElementById('historyList');
            const searchQuery = document.getElementById('searchHistory').value.toLowerCase();
            list.innerHTML = '';
            let totalProfit = 0;

            const filteredHistory = history.filter(item => item.name.toLowerCase().includes(searchQuery));

            filteredHistory.forEach((item) => {
                totalProfit += item.netProfit;
                const el = document.createElement('div');
                el.className = 'history-card bg-white rounded-[2rem] shadow-sm border border-amber-100 overflow-hidden transition-all';
                el.innerHTML = `
                    <div class="p-5 flex items-center justify-between cursor-pointer" onclick="handleCardClick(event, this)">
                        <div class="flex items-center gap-4 min-w-0">
                            <div class="chevron transition-transform text-amber-200">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="4"></path></svg>
                            </div>
                            <div class="min-w-0">
                                <h3 class="font-black text-black truncate text-[15px] tracking-tight mb-0.5">${item.name}</h3>
                                <p class="text-[10px] font-mono font-bold text-blue-500 leading-tight">
                                    ${item.foreign.toLocaleString()} ${item.currency} · RATE ${item.bankRate.toFixed(4)}
                                </p>
                                <p class="text-[9px] font-mono font-bold text-gray-300 mt-1 tracking-tight">${item.date} ${item.time}</p>
                            </div>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <div>
                                <p class="text-[18px] font-black text-gray-900 leading-none tabular-nums">$${item.finalPrice.toLocaleString()}</p>
                                <p class="text-[11px] text-green-600 font-black mt-1">+$${Math.round(item.netProfit).toLocaleString()}</p>
                            </div>
                            <button onclick="deleteItem(${item.id})" class="p-2 text-gray-200 hover:text-red-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="detail-panel bg-amber-50/50 border-t border-amber-100/50">
                        <div class="p-5 space-y-6">
                            <div class="flex flex-col gap-3">
                                <label class="text-[9px] font-black text-amber-400 uppercase italic tracking-widest pl-1">Product Details</label>
                                <div class="flex gap-4 items-center">
                                    ${item.image ? `<img src="${item.image}" onclick="showBigImage('${item.image}')" class="w-24 h-24 rounded-2xl object-cover border-4 border-white shadow-md shrink-0 cursor-pointer">` : `<div class="w-24 h-24 bg-white rounded-2xl border border-amber-100 flex items-center justify-center text-amber-200 shrink-0 text-[10px] font-bold">NO IMAGE</div>`}
                                    
                                    <div class="flex-grow min-w-0">
                                        <label class="text-[8px] font-black text-blue-400 uppercase italic mb-1 block">Product Name</label>
                                        <div id="name-display-${item.id}" class="flex items-center gap-2 mb-2">
                                            <span class="text-sm font-black text-gray-700 truncate">${item.name}</span>
                                            <button onclick="toggleEdit(${item.id})" class="p-1.5 bg-white rounded-lg shadow-sm text-amber-400 hover:text-amber-500 active:scale-90 transition-all">
                                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"></path></svg>
                                            </button>
                                        </div>
                                        <div id="name-edit-${item.id}" class="hidden flex items-center gap-2 mb-2">
                                            <input type="text" value="${item.name}" id="edit-input-${item.id}" class="flex-grow p-2.5 bg-white border border-amber-200 rounded-xl text-xs font-bold outline-none shadow-sm text-gray-700">
                                            <button onclick="updateName(${item.id})" class="w-9 h-9 bg-green-500 text-white rounded-xl shadow-md active:scale-90 flex items-center justify-center shrink-0">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                            </button>
                                        </div>
                                        <div class="flex items-center gap-1.5">
                                            <svg class="w-3 h-3 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                                            <span class="text-[10px] font-black text-amber-600 bg-amber-100 px-2 py-0.5 rounded-full uppercase italic">${item.weightLabel}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="flex gap-2">
                                <div class="stat-box">
                                    <p class="text-[8px] text-gray-400 font-bold mb-1 uppercase">Cost</p>
                                    <p class="text-[11px] font-black text-gray-700 leading-none">$${item.rawTwdCost.toLocaleString()}</p>
                                </div>
                                <div class="stat-box">
                                    <p class="text-[8px] text-red-300 font-bold mb-1 uppercase">Fees</p>
                                    <p class="text-[11px] font-black text-red-400 leading-none">-$${item.extraFee.toLocaleString()}</p>
                                </div>
                                <div class="stat-box">
                                    <p class="text-[8px] text-blue-300 font-bold mb-1 uppercase">Refund</p>
                                    <p class="text-[11px] font-black text-blue-400 leading-none">+$${item.refundTwd.toLocaleString()}</p>
                                </div>
                                <div class="stat-box !border-green-100 !bg-green-50/20">
                                    <p class="text-[8px] text-green-400 font-black mb-1 uppercase">Profit</p>
                                    <p class="text-[11px] font-black text-green-600 leading-none">+$${Math.round(item.netProfit).toLocaleString()}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(el);
            });
            document.getElementById('totalProfit').innerText = Math.round(totalProfit).toLocaleString();
        }

        function handleCardClick(event, el) {
            if (event.target.closest('button') || event.target.closest('input')) return;
            el.closest('.history-card').classList.toggle('expanded');
        }

        function deleteItem(id) { history = history.filter(i => i.id !== id); render(); }
        function showBigImage(src) { document.getElementById('fullImage').src = src; document.getElementById('imageModal').style.display = 'flex'; }

        function exportToExcel() {
            if (history.length === 0) return;
            const headers = ["Time", "Product", "Foreign Price", "Currency", "Exchange Rate", "TWD Cost", "Fees", "Refund", "Weight", "Manual Cost", "Final Price", "Profit"];
            const rows = history.map(item => [item.timestamp, `"${item.name}"`, item.foreign, item.currency, item.bankRate, item.rawTwdCost, -item.extraFee, item.refundTwd, item.weightLabel, item.manualCostInput, item.finalPrice, Math.round(item.netProfit)]);
            let csvContent = "\uFEFF" + headers.join(",") + "\n" + rows.map(r => r.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", `YU_ZZZ_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        ['profitPercent', 'foreignPrice', 'currency', 'itemName', 'manualCost', 'bankFeeInput'].forEach(id => {
            document.getElementById(id).addEventListener('input', update);
        });

        window.onload = syncRates;
    </script>
</body>
</html>
